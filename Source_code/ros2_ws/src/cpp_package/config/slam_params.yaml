#For test purposes, using AI generate config


slam_toolbox:
  ros__parameters:
    # Plugin
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Frames - must match the TF tree
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan        # TurtleBot3 uses LiDAR -> /scan
                             # change this later for the real robot

    # Mode
    mode: mapping            # mapping while exploring, localization once a map exists

    # Simulation
    use_sim_time: true

    # Update frequency
    map_update_interval: 0.5      # update the map every 0.5 seconds
    resolution: 0.05              # map resolution (m/cell)
    max_laser_range: 3.5          # TurtleBot3 burger LiDAR range ~3.5m

    # When to update the map
    minimum_travel_distance: 0.2  # move at least 20cm
    minimum_travel_heading: 0.2   # or rotate at least 0.2 rad

    # Loop closure
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_covariance: 3.0
    loop_match_minimum_response_fine: 0.45

    # Scan matching
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
